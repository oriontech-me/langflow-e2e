name: Nightly E2E Regression

on:
  schedule:
    - cron: "0 6 * * *"  # 03:00 BRT (UTC-3), every day
  workflow_dispatch:
    inputs:
      langflow_image_tag:
        description: "Langflow nightly image tag (e.g. latest, 1.5.1.dev36)"
        required: false
        default: "latest"
      test_grep:
        description: "Filter tests by pattern (leave empty for all)"
        required: false
        default: ""

jobs:
  e2e-nightly:
    name: Nightly E2E (langflow-nightly:${{ github.event.inputs.langflow_image_tag || 'latest' }})
    runs-on: ubuntu-latest
    timeout-minutes: 90

    services:
      langflow:
        image: langflowai/langflow-nightly:${{ github.event.inputs.langflow_image_tag || 'latest' }}
        ports:
          - 7860:7860
        env:
          LANGFLOW_AUTO_LOGIN: "true"
          LANGFLOW_SUPERUSER: langflow
          LANGFLOW_SUPERUSER_PASSWORD: langflow
          LANGFLOW_DEACTIVATE_TRACING: "true"
        options: >-
          --health-cmd "curl -f http://localhost:7860/health_check || exit 1"
          --health-interval 15s
          --health-timeout 10s
          --health-retries 10
          --health-start-period 90s

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: |
          GREP="${{ github.event.inputs.test_grep }}"
          if [ -n "$GREP" ]; then
            npx playwright test --grep "$GREP" --reporter=github
          else
            npx playwright test --reporter=github
          fi
        env:
          CI: "true"
          PLAYWRIGHT_BASE_URL: "http://localhost:7860/"

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-nightly-${{ github.run_id }}
          path: playwright-report/
          retention-days: 14

      - name: Upload test results on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results-nightly-${{ github.run_id }}
          path: test-results/
          retention-days: 7

      - name: Create issue on failure
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().split('T')[0];
            const tag = '${{ github.event.inputs.langflow_image_tag || "latest" }}';
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Nightly Failure] E2E tests failed on ${today} (langflow:${tag})`,
              body: [
                '## Nightly E2E Test Failure',
                '',
                `- **Date:** ${today}`,
                `- **Langflow version:** \`langflowai/langflow-nightly:${tag}\``,
                `- **Run:** [${context.runId}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
                '',
                '### Next steps',
                '1. Check the Playwright report artifact in the run above',
                '2. Determine if the failure is a test bug or a Langflow regression',
                '3. Update or fix the affected tests',
                '',
                '/cc @lice-reis',
              ].join('\n'),
              labels: ['nightly-failure', 'needs-triage'],
            });
